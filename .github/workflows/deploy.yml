name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: verify the build works ──────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build React
        run: npm run build

      - name: Build Docker image
        run: docker build -t blog-engine:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run --rm blog-engine:${{ github.sha }} node -e "console.log('OK')"

  # ── Deploy: trigger Coolify on merge to main ────────────────────
  deploy:
    name: Deploy to Coolify
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -X GET "https://coolify.buymediamonds.co.uk/api/v1/deploy?uuid=m0kso0s8gskss0k04ccsowoc&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --fail \
            --silent \
            --show-error
