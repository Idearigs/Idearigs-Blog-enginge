services:
  blog-engine:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - blog_data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/blog_automation.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  blog_data:
    driver: local
